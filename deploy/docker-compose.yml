services:
  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.nginx
      args:
        - VITE_APP_WS_SERVER_URL=${VITE_APP_WS_SERVER_URL}
        - VITE_APP_FIREBASE_CONFIG=${VITE_APP_FIREBASE_CONFIG}
        - VITE_APP_BACKEND_V2_GET_URL=${VITE_APP_BACKEND_V2_GET_URL:-https://json.excalidraw.com/api/v2/}
        - VITE_APP_BACKEND_V2_POST_URL=${VITE_APP_BACKEND_V2_POST_URL:-https://json.excalidraw.com/api/v2/post/}
        - VITE_APP_SITE_PASSWORD_HASH=${SITE_PASSWORD_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN}
      - SITE_PASSWORD_HASH=${SITE_PASSWORD_HASH}
      - COOKIE_SECRET=${COOKIE_SECRET}
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=1m
      - /tmp:size=16m
    depends_on:
      - excalidraw-room

  excalidraw-room:
    build:
      context: ./excalidraw-room
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    tmpfs:
      - /tmp:size=16m

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped
    mem_limit: 64m

volumes:
  certbot-conf:
  certbot-www:
