load_module modules/ngx_http_js_module.so;

env SITE_PASSWORD_HASH;
env COOKIE_SECRET;

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    js_path /etc/nginx/njs/;
    js_import auth from auth.js;

    # Auth check via cookie — returns "1" if valid, "" if not
    js_set $auth_ok auth.checkAuth;

    # Rate limit login attempts
    limit_req_zone $binary_remote_addr zone=auth_limit:1m rate=5r/m;

    # ── Villa Sirene (HTTP only, raw IP / EC2 hostname) ──
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://host.docker.internal:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── Excalidraw: HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name draw.gaiachagnon.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Excalidraw: HTTPS ──
    server {
        listen 443 ssl;
        http2 on;
        server_name draw.gaiachagnon.com;

        ssl_certificate /etc/letsencrypt/live/draw.gaiachagnon.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/draw.gaiachagnon.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:2m;
        ssl_session_timeout 1h;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Login page — no auth required
        location = /__auth {
            js_content auth.loginPage;
        }

        # Login verification — no auth required
        location = /__auth/verify {
            limit_req zone=auth_limit burst=3 nodelay;
            js_content auth.login;
        }

        # Room picker page — requires auth
        location = /__rooms {
            if ($auth_ok != "1") {
                return 302 /__auth;
            }
            js_content auth.roomsPage;
        }

        # Rooms API — requires auth
        location = /__api/rooms {
            if ($auth_ok != "1") {
                return 403;
            }
            js_content auth.roomsApi;
        }

        # AI proxy — requires auth
        location /v1/ai/ {
            if ($auth_ok != "1") {
                return 403;
            }
            proxy_pass http://ai-proxy:3016/v1/ai/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }

        # WebSocket proxy to excalidraw-room
        location /socket.io/ {
            if ($auth_ok != "1") {
                return 403;
            }
            proxy_pass http://excalidraw-room:80/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Storage API proxy — requires auth
        location /v1/storage/ {
            if ($auth_ok != "1") {
                return 403;
            }
            proxy_pass http://storage-api:3017/v1/storage/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
            client_max_body_size 10m;
        }

        # Library files — no auth required (served to authenticated users via JS)
        location /libraries/ {
            alias /usr/share/nginx/libraries/;
            add_header Access-Control-Allow-Origin "*";
            add_header Content-Type "application/json";
        }

        # Static Excalidraw SPA
        location / {
            if ($auth_ok != "1") {
                return 302 /__auth;
            }

            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
