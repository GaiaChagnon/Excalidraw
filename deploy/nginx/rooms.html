<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excalidraw — Rooms</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      position: relative;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .room-list {
      list-style: none;
      margin-bottom: 1.5rem;
    }
    .room-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border: 1.5px solid #eee;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .room-item:hover {
      border-color: #6965db;
      background: #f8f7ff;
    }
    .room-name {
      font-weight: 500;
      font-size: 1rem;
    }
    .room-meta {
      font-size: 0.8rem;
      color: #999;
    }
    .room-actions {
      display: flex;
      gap: 0.25rem;
      align-items: center;
    }
    .btn-action {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.25rem;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 1;
    }
    .btn-action.rename:hover { color: #6965db; }
    .btn-action.delete:hover { color: #e74c3c; }
    .empty {
      text-align: center;
      color: #aaa;
      padding: 2rem 0;
      font-size: 0.95rem;
    }
    .create-form {
      display: flex;
      gap: 0.5rem;
    }
    .create-form input {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }
    .create-form input:focus { border-color: #6965db; }
    .btn-create {
      padding: 0.65rem 1.25rem;
      background: #6965db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-create:hover { background: #5b57c9; }

    /* Drop zone */
    .drop-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(105, 101, 219, 0.08);
      border: 2.5px dashed #6965db;
      border-radius: 12px;
      z-index: 50;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .drop-overlay.active {
      display: flex;
    }
    .drop-overlay-icon {
      font-size: 2rem;
      color: #6965db;
    }
    .drop-overlay-text {
      font-size: 1rem;
      color: #6965db;
      font-weight: 500;
    }

    /* Modal (shared between delete & rename) */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 340px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .modal h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    .modal input {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 0.75rem;
    }
    .modal input:focus { border-color: #6965db; }
    .modal-btns {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }
    .modal-btns button {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
    }
    .btn-cancel { background: #eee; color: #666; }
    .btn-confirm-delete { background: #e74c3c; color: white; }
    .btn-confirm-rename { background: #6965db; color: white; }
    .error-msg { color: #e74c3c; font-size: 0.85rem; margin-top: 0.25rem; display: none; }
    .label { font-size: 0.85rem; color: #666; margin-bottom: 0.35rem; }
  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="drop-overlay" id="dropOverlay">
      <div class="drop-overlay-icon">&#128196;</div>
      <div class="drop-overlay-text">Drop .excalidraw file to create a room</div>
    </div>
    <h1>Excalidraw Rooms</h1>
    <ul class="room-list" id="roomList">
      <li class="empty" id="emptyMsg">Loading...</li>
    </ul>
    <form class="create-form" id="createForm">
      <input type="text" id="roomName" placeholder="New room name" required maxlength="50">
      <button type="submit" class="btn-create">Create</button>
    </form>
  </div>

  <!-- Delete modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h2>Delete room</h2>
      <p style="margin-bottom:1rem;color:#666;font-size:0.9rem;" id="deleteRoomName"></p>
      <input type="password" id="adminPassword" placeholder="Admin password" autocomplete="off">
      <p class="error-msg" id="deleteError">Wrong password</p>
      <div class="modal-btns">
        <button class="btn-cancel" type="button" id="cancelDelete">Cancel</button>
        <button class="btn-confirm-delete" type="button" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Rename modal -->
  <div class="modal-overlay" id="renameModal">
    <div class="modal">
      <h2>Rename room</h2>
      <p class="label">Admin password</p>
      <input type="password" id="renamePassword" placeholder="Admin password" autocomplete="off">
      <p class="label">New name</p>
      <input type="text" id="renameNewName" placeholder="New room name" maxlength="50">
      <p class="error-msg" id="renameError">Wrong password</p>
      <div class="modal-btns">
        <button class="btn-cancel" type="button" id="cancelRename">Cancel</button>
        <button class="btn-confirm-rename" type="button" id="confirmRename">Rename</button>
      </div>
    </div>
  </div>

  <script>
    var deleteTarget = null;
    var renameTarget = null;
    var dragCounter = 0;

    async function loadRooms() {
      try {
        var resp = await fetch("/__api/rooms");
        var rooms = await resp.json();
        var list = document.getElementById("roomList");

        if (!rooms.length) {
          list.innerHTML = '<li class="empty">No rooms yet. Create one below.</li>';
          return;
        }

        list.innerHTML = "";
        rooms.forEach(function(room) {
          var li = document.createElement("li");
          li.className = "room-item";
          li.innerHTML =
            '<div>' +
              '<div class="room-name">' + escapeHtml(room.name) + '</div>' +
              '<div class="room-meta">Created ' + new Date(room.created).toLocaleDateString() + '</div>' +
            '</div>' +
            '<div class="room-actions">' +
              '<button class="btn-action rename" data-id="' + room.id + '" data-name="' + escapeHtml(room.name) + '" title="Rename">&#9998;</button>' +
              '<button class="btn-action delete" data-id="' + room.id + '" data-name="' + escapeHtml(room.name) + '" title="Delete">&times;</button>' +
            '</div>';

          li.addEventListener("click", function(e) {
            if (e.target.classList.contains("btn-action")) return;
            var pwParam = "";
            var siteHash = getSitePasswordHash();
            if (siteHash) pwParam = "&pw=" + siteHash;
            window.location.href = "/#room=" + room.id + "," + room.key + pwParam;
          });

          list.appendChild(li);
        });

        // Bind delete buttons
        document.querySelectorAll(".btn-action.delete").forEach(function(btn) {
          btn.addEventListener("click", function(e) {
            e.stopPropagation();
            deleteTarget = { id: btn.dataset.id, name: btn.dataset.name };
            document.getElementById("deleteRoomName").textContent = 'Delete "' + btn.dataset.name + '"?';
            document.getElementById("adminPassword").value = "";
            document.getElementById("deleteError").style.display = "none";
            document.getElementById("deleteModal").classList.add("active");
            document.getElementById("adminPassword").focus();
          });
        });

        // Bind rename buttons
        document.querySelectorAll(".btn-action.rename").forEach(function(btn) {
          btn.addEventListener("click", function(e) {
            e.stopPropagation();
            renameTarget = { id: btn.dataset.id, name: btn.dataset.name };
            document.getElementById("renameNewName").value = btn.dataset.name;
            document.getElementById("renamePassword").value = "";
            document.getElementById("renameError").style.display = "none";
            document.getElementById("renameModal").classList.add("active");
            document.getElementById("renamePassword").focus();
          });
        });
      } catch (e) {
        document.getElementById("roomList").innerHTML =
          '<li class="empty">Error loading rooms</li>';
      }
    }

    function escapeHtml(str) {
      var d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function getSitePasswordHash() {
      return "";
    }

    async function sha256(msg) {
      var buf = new TextEncoder().encode(msg);
      var hash = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(hash)).map(function(b) {
        return b.toString(16).padStart(2, "0");
      }).join("");
    }

    // ---- Create room ----
    document.getElementById("createForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      var name = document.getElementById("roomName").value.trim();
      if (!name) return;

      try {
        var resp = await fetch("/__api/rooms", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name })
        });
        if (resp.ok) {
          document.getElementById("roomName").value = "";
          loadRooms();
        }
      } catch (e) {}
    });

    // ---- Delete room ----
    document.getElementById("cancelDelete").addEventListener("click", function() {
      document.getElementById("deleteModal").classList.remove("active");
      deleteTarget = null;
    });

    document.getElementById("confirmDelete").addEventListener("click", async function() {
      if (!deleteTarget) return;
      var password = document.getElementById("adminPassword").value;
      var passwordHash = await sha256(password);

      try {
        var resp = await fetch("/__api/rooms?id=" + deleteTarget.id, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminPasswordHash: passwordHash })
        });
        if (resp.ok) {
          document.getElementById("deleteModal").classList.remove("active");
          deleteTarget = null;
          loadRooms();
        } else {
          document.getElementById("deleteError").style.display = "block";
        }
      } catch (e) {
        document.getElementById("deleteError").style.display = "block";
      }
    });

    // ---- Rename room ----
    document.getElementById("cancelRename").addEventListener("click", function() {
      document.getElementById("renameModal").classList.remove("active");
      renameTarget = null;
    });

    document.getElementById("confirmRename").addEventListener("click", async function() {
      if (!renameTarget) return;
      var password = document.getElementById("renamePassword").value;
      var newName = document.getElementById("renameNewName").value.trim();
      if (!newName) {
        document.getElementById("renameError").textContent = "Name cannot be empty";
        document.getElementById("renameError").style.display = "block";
        return;
      }
      var passwordHash = await sha256(password);

      try {
        var resp = await fetch("/__api/rooms?id=" + renameTarget.id, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ adminPasswordHash: passwordHash, name: newName })
        });
        if (resp.ok) {
          document.getElementById("renameModal").classList.remove("active");
          renameTarget = null;
          loadRooms();
        } else {
          document.getElementById("renameError").textContent = "Wrong password";
          document.getElementById("renameError").style.display = "block";
        }
      } catch (e) {
        document.getElementById("renameError").textContent = "Wrong password";
        document.getElementById("renameError").style.display = "block";
      }
    });

    // ---- Close modals on overlay click ----
    document.getElementById("deleteModal").addEventListener("click", function(e) {
      if (e.target === this) {
        this.classList.remove("active");
        deleteTarget = null;
      }
    });
    document.getElementById("renameModal").addEventListener("click", function(e) {
      if (e.target === this) {
        this.classList.remove("active");
        renameTarget = null;
      }
    });

    // ---- Close modals on Escape ----
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        document.getElementById("deleteModal").classList.remove("active");
        document.getElementById("renameModal").classList.remove("active");
        deleteTarget = null;
        renameTarget = null;
      }
    });

    // ---- Drag and drop .excalidraw files ----
    var container = document.getElementById("container");
    var dropOverlay = document.getElementById("dropOverlay");

    container.addEventListener("dragenter", function(e) {
      e.preventDefault();
      dragCounter++;
      dropOverlay.classList.add("active");
    });

    container.addEventListener("dragleave", function(e) {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        dropOverlay.classList.remove("active");
      }
    });

    container.addEventListener("dragover", function(e) {
      e.preventDefault();
    });

    container.addEventListener("drop", async function(e) {
      e.preventDefault();
      dragCounter = 0;
      dropOverlay.classList.remove("active");

      var files = e.dataTransfer.files;
      if (!files.length) return;

      var file = files[0];
      if (!file.name.endsWith(".excalidraw")) {
        alert("Please drop an .excalidraw file.");
        return;
      }

      try {
        var text = await file.text();
        // Validate it's valid JSON
        var sceneData = JSON.parse(text);

        // Derive room name from file name (strip extension)
        var roomName = file.name.replace(/\.excalidraw$/, "");

        // Create the room
        var resp = await fetch("/__api/rooms", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: roomName })
        });

        if (resp.ok) {
          var room = await resp.json();
          // Store the scene data in localStorage keyed by room ID
          // Excalidraw uses this key pattern for loading scenes
          localStorage.setItem("excalidraw_scene_" + room.id, text);
          loadRooms();
        }
      } catch (err) {
        alert("Could not read the file. Make sure it is a valid .excalidraw file.");
      }
    });

    // Prevent default browser drop behavior on the whole page
    document.addEventListener("dragover", function(e) { e.preventDefault(); });
    document.addEventListener("drop", function(e) { e.preventDefault(); });

    loadRooms();

    // Auto-refresh room list every 5 seconds
    setInterval(loadRooms, 5000);
  </script>
</body>
</html>
